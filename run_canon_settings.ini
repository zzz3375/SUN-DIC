#-------------------------------------------------------------------------------------
[General]
#-------------------------------------------------------------------------------------
# Set the debug level - higher levels produce more output
DebugLevel = 1

# Subdirectory that contains the images
ImageFolder = C:\Users\13694\dic-data\Canon

# Number of CPU's to use in the analysis
CPUCount = 1

# Set the type of DIC to perform
DICType = Planar

#-------------------------------------------------------------------------------------
[DICSettings]
#-------------------------------------------------------------------------------------
# The subset size to use (in pixels) - must be odd
# ROI is 94 pixels wide, so subset must be < 94
# Using SubsetSize=41 for balance of texture matching and speed
# 1681 pixels per subset (vs 2601 for 51, vs 961 for 31)
SubSetSize = 31

# The subset step size to use (in pixels)
StepSize = 8

# Subset shape functions to use
ShapeFunctions = Affine

# The reference strategy between images
# Absolute: every frame compared to datum (more stable for this data)
ReferenceStrategy = Absolute

# Number of starting points for the AKAZE initial guess
# More points for better initial coverage of the tall ROI
StartingPoints = 6

#-------------------------------------------------------------------------------------
[PreProcess]
#-------------------------------------------------------------------------------------
# Gaussian blur size (odd number)
GaussianBlurSize = 5

# Gaussian blur standard deviation (0 = auto-calculated)
GaussianBlurStdDev = 0.0

#-------------------------------------------------------------------------------------
[ImageSetDefinition]
#-------------------------------------------------------------------------------------
# The reference/first image index (0-based)
DatumImage = 0

# The target/final image index (-1 = last image in set)
# Use 10 for testing; change to -1 for all 734 images
TargetImage = 10

# Increment between images
Increment = 1

# Region of Interest: XStart, YStart, XLength, YLength
# Based on DICpy case_study: top-left(2430,2200) to bottom-right(2524,7339)
# ROI = 2430, 2200, 94, 5139
ROI = 1349, 2430, 5139, 94
# Cutoff value to detect all-black background
BackgroundCutoff = 0

# Optional mask file path (leave empty for none)
MaskFile = 

#-------------------------------------------------------------------------------------
[Optimisation]
#-------------------------------------------------------------------------------------
# The optimization algorithm: IC-GN | IC-LM | Fast-IC-LM
# Using IC-LM for better robustness on real experimental data
OptimizationAlgorithm = IC-LM

# Maximum iterations per subset
MaxIterations = 50

# Interpolation order: 3 or 5
InterpolationOrder = 3

# Convergence threshold for displacement change
ConvergenceThreshold = 0.0001

# Convergence threshold for NZCC correlation value
# 0.99 is very strict for real data; using 0.8 for better convergence
NZCCThreshold = 0.8
